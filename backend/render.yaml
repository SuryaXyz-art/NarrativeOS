services:
  - type: web
    name: narrativeos-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NOUS_API_KEY
        sync: false
      - key: SOSOVALUE_API_KEY
        sync: false
